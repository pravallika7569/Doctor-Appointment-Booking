<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/modern.css">
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen py-10">

  <div class="max-w-5xl mx-auto px-4">
    <h2 class="text-3xl font-semibold text-gray-800 mb-6 text-center">Analytics Dashboard</h2>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
      <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition duration-200 text-center">
        <p class="text-gray-500">Users</p>
        <p class="text-2xl font-bold text-gray-800">{{ total_users }}</p>
      </div>
      <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition duration-200 text-center">
        <p class="text-gray-500">Doctors</p>
        <p class="text-2xl font-bold text-gray-800">{{ total_doctors }}</p>
      </div>
      <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition duration-200 text-center">
        <p class="text-gray-500">Appointments</p>
        <p class="text-2xl font-bold text-gray-800">{{ total_appointments }}</p>
      </div>
    </div>

    <!-- Top Doctors -->
    <h3 class="text-xl font-semibold text-gray-700 mb-4">Top Doctors</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
      {% for d in top_docs %}
        <div class="p-4 bg-white rounded-2xl shadow hover:shadow-lg transition duration-200">
          <p class="text-gray-800 font-medium">{{ d.name }}</p>
          <p class="text-gray-500 text-sm">Rating: <span class="font-semibold">{{ d.rating }}</span></p>
        </div>
      {% endfor %}
    </div>
  </div>

</body>
</html>
