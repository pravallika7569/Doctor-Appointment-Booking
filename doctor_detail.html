<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ doctor.name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/modern.css">
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen py-10">

  <div class="max-w-2xl mx-auto px-4">
    <!-- Doctor Info -->
    <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition duration-200 mb-6">
      <h2 class="text-3xl font-semibold text-gray-800">{{ doctor.name }}</h2>
      <p class="text-gray-500 mt-1">{{ doctor.specialization }} — Rating: <span class="font-medium">{{ doctor.rating }}</span> ({{ doctor.reviews }} reviews)</p>
      <p class="text-gray-600 mt-2">{{ doctor.bio }}</p>
      <a href="/book/{{ doctor._id }}" class="inline-block mt-4 px-6 py-3 bg-blue-600 text-white font-medium rounded-xl shadow hover:bg-blue-700 transition duration-200">
        Book Appointment
      </a>
    </div>

    <!-- Rate Doctor -->
    <div class="p-6 bg-white rounded-2xl shadow hover:shadow-lg transition duration-200">
      <h3 class="text-2xl font-semibold text-gray-700 mb-4">Rate this Doctor</h3>
      <form method="post" action="/rate/{{ doctor._id }}" class="flex flex-col sm:flex-row gap-3">
        <select name="score" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="5">5 - Excellent</option>
          <option value="4">4 - Good</option>
          <option value="3">3 - Average</option>
          <option value="2">2 - Poor</option>
          <option value="1">1 - Very Poor</option>
        </select>
        <button type="submit" class="px-6 py-2 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 transition duration-200">
          Submit
        </button>
      </form>
    </div>
  </div>

</body>
</html>
